version: "3.9"

services:
  # API service (scale this: --scale api=1/2/3)
  api:
    image: pathmnist-mlops
    command: python -m uvicorn src.prediction:app --host 0.0.0.0 --port 8000
    expose:
      - "8000"
    networks:
      - mlops-net

  # Nginx load balancer in front of API replicas
  lb:
    image: nginx:alpine
    depends_on:
      - api
    ports:
      - "8000:8000"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - mlops-net

  # Optional local UI (reads API through load balancer)
  ui:
    image: pathmnist-mlops
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://lb:8000
    depends_on:
      - lb
    networks:
      - mlops-net

networks:
  mlops-net:
    driver: bridge
